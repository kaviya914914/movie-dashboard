name: Docker CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t movie-dashboard .

      - name: Test Container
        run: |
          docker run -d -p 5000:5000 --name test-container movie-dashboard
          sleep 5
          docker ps
          docker stop test-container
          docker rm test-container